<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { width: 350px; padding: 12px; font-family: Arial, sans-serif; background: #f9f9f9; }
        h3 { margin-top: 0; color: #333; }
        textarea { width: 100%; height: 150px; box-sizing: border-box; padding: 8px; border: 1px solid #ccc; border-radius: 4px; resize: vertical; }
        button { width: 100%; padding: 10px; margin-top: 10px; cursor: pointer; background: #2563eb; color: white; border: none; border-radius: 4px; font-weight: bold; }
        button:hover { background: #1d4ed8; }
        .note { font-size: 11px; color: #666; margin-top: 6px; }
    </style>
</head>
<body>
    <h3>Auto Typer</h3>
    <textarea id="textInput" placeholder="Dán câu trả lời của bạn vào đây..."></textarea>
    <button id="startTyping">Bắt đầu gõ vào ô đang chọn</button>
    <p class="note">Hướng dẫn: 1. Click chuột vào ô nhập liệu -> 2. Bật Extension này lên -> 3. Bấm nút.</p>

    <script src="popup.js"></script>
</body>
</html>
